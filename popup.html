<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 180px; 
      padding: 15px; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background-color: #f0f2f5;
    }
    h4 { margin-top: 0; color: #1c1e21; }
    button { 
      width: 100%; 
      padding: 10px; 
      background-color: #0866FF; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: bold;
      transition: background 0.3s;
    }
    button:hover { background-color: #0056e0; }
  </style>
</head>
<body>
  <h4>FB Copier</h4>
  <button id="copyBtn">Copy Post Story</button>
  <script src="popup.js"></script>
</body>
</html>
